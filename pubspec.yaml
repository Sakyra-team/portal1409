name: portal1409
description: "Portal app for teacher"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.3.2

  cupertino_icons: ^1.0.8
  retrofit: ^4.9.2
  flutter_secure_storage: ^10.0.0
  auto_route: ^11.1.0
  get_it: ^9.2.1
  dio: ^5.9.2
  json_annotation: ^4.11.0
  flutter_svg: ^2.2.4
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  meta: ^1.17.0
  equatable: ^2.0.8
  liquid_progress_indicator_v2: ^0.5.0
  
  # talker: ^5.1.15
  # talker_dio_logger: ^5.1.15
  # talker_bloc_logger: ^5.1.15
  shared_preferences: ^2.5.4
  firebase_core: ^4.6.0
  share_plus: ^12.0.2
  qr_flutter: ^4.1.0




dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  retrofit_generator: ^10.2.3
  json_serializable: ^6.13.1
  auto_route_generator: ^10.5.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
          weight: 400
        - asset: assets/fonts/Montserrat-Medium.ttf
          weight: 500
        - asset: assets/fonts/Montserrat-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700
